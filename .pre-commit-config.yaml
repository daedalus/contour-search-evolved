repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.9.0
  hooks:
  - id: ruff-format
  - id: ruff
    args:
      - --fix

- repo: https://github.com/jendrikseipp/vulture
  rev: v2.16
  hooks:
  - id: vulture
    args: ["--min-confidence", "90", "--exclude", ".venv", "."]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.13.0
  hooks:
  - id: mypy
    additional_dependencies: [types-PyYAML, libcst>=0.4.0]
    exclude: ^(tests/)
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
- repo: local
  hooks:
  - id: lizard
    name: lizard - Code Complexity Check
    entry: lizard search/ alphaevolve/ --languages python --CCN 15 -w -x "alphaevolve/candidates/*"
    language: system
    pass_filenames: false
  - id: impactguard-check
    name: ImpactGuard - Full Pipeline Check
    entry: impactguard-check-staged
    language: system
    stages:
      - pre-commit
  - id: impactguard-post-commit
    name: ImpactGuard - Post-Commit Analysis
    entry: impactguard-post-commit-hook
    language: system
    always_run: true
    stages:
      - post-commit
